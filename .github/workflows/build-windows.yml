name: Build Windows
on:
  workflow_dispatch:

jobs:
  build:
    name: ShardCoin Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-libevent
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-zeromq
            mingw-w64-x86_64-db
            mingw-w64-x86_64-miniupnpc
            mingw-w64-x86_64-libsodium
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-fmt
            base-devel
            autoconf
            automake
            libtool
            pkg-config
            python3
            git

      - name: Build ShardCoin
        shell: msys2 {0}
        run: |
          # Debug: show what Boost libs exist
          ls /mingw64/lib/libboost_system* || echo "No boost_system libs found"
          ls /mingw64/lib/cmake/Boost*/BoostConfig.cmake || echo "No cmake config"

          ./autogen.sh

          # Patch configure to find MSYS2 Boost (it uses -mt suffixed libs)
          # The configure macro checks for -lboost_system but MSYS2 has -lboost_system-mt
          export BOOST_LIB_SUFFIX="-mt"

          ./configure \
            --without-gui \
            --without-miniupnpc \
            --disable-zmq \
            --disable-bench \
            --disable-fuzz-binary \
            --disable-tests \
            --with-incompatible-bdb \
            --with-boost=/mingw64 \
            --with-boost-libdir=/mingw64/lib \
            CXXFLAGS="-O2" \
            LDFLAGS="-L/mingw64/lib" \
            CPPFLAGS="-I/mingw64/include" \
            LIBS="-lws2_32 -lssp -lbcrypt"
          make -j$(nproc)

      - name: Find binaries
        shell: msys2 {0}
        run: find src -name "*.exe" -type f 2>/dev/null | head -20

      - name: Package
        shell: msys2 {0}
        run: |
          mkdir -p dist/shardcoin-win64
          cp src/shardcoind.exe dist/shardcoin-win64/ || cp src/.libs/shardcoind.exe dist/shardcoin-win64/ || true
          cp src/shardcoin-cli.exe dist/shardcoin-win64/ || cp src/.libs/shardcoin-cli.exe dist/shardcoin-win64/ || true
          cp src/shardcoin-tx.exe dist/shardcoin-win64/ || cp src/.libs/shardcoin-tx.exe dist/shardcoin-win64/ || true
          cp src/shardcoin-wallet.exe dist/shardcoin-win64/ || cp src/.libs/shardcoin-wallet.exe dist/shardcoin-win64/ || true
          ls dist/shardcoin-win64/

      - name: Copy DLLs
        shell: msys2 {0}
        run: |
          for dll in /mingw64/bin/libboost_filesystem-mt.dll /mingw64/bin/libboost_thread-mt.dll /mingw64/bin/libcrypto-*.dll /mingw64/bin/libssl-*.dll /mingw64/bin/libevent*.dll /mingw64/bin/libdb*.dll /mingw64/bin/libsqlite*.dll /mingw64/bin/libstdc++-*.dll /mingw64/bin/libgcc_s_seh-*.dll /mingw64/bin/libwinpthread-*.dll /mingw64/bin/zlib*.dll /mingw64/bin/libfmt*.dll; do
            cp $dll dist/shardcoin-win64/ 2>/dev/null || true
          done
          ls dist/shardcoin-win64/

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path dist/shardcoin-win64 -DestinationPath dist/shardcoin-win64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: shardcoin-win64
          path: dist/shardcoin-win64.zip

name: Build Windows
on:
  workflow_dispatch:

jobs:
  build:
    name: ShardCoin Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-libevent
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-zeromq
            mingw-w64-x86_64-db
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-qrencode
            mingw-w64-x86_64-miniupnpc
            mingw-w64-x86_64-libsodium
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-fmt
            base-devel
            autoconf
            automake
            libtool
            pkg-config
            python3
            git

      - name: Find Boost
        shell: msys2 {0}
        run: |
          ls /mingw64/lib/libboost_system* || true
          pkg-config --libs boost_system 2>/dev/null || true
          echo "Boost include:" && ls /mingw64/include/boost/version.hpp

      - name: Build ShardCoin
        shell: msys2 {0}
        run: |
          ./autogen.sh
          ./configure \
            --prefix=/mingw64 \
            --without-gui \
            --disable-bench \
            --disable-fuzz-binary \
            --with-incompatible-bdb \
            --with-boost=/mingw64 \
            CXXFLAGS="-O2 -I/mingw64/include" \
            LDFLAGS="-L/mingw64/lib"
          make -j$(nproc)

      - name: Package
        shell: msys2 {0}
        run: |
          mkdir -p dist/shardcoin-win64
          cp src/shardcoind.exe dist/shardcoin-win64/ 2>/dev/null || true
          cp src/shardcoin-cli.exe dist/shardcoin-win64/ 2>/dev/null || true
          cp src/shardcoin-tx.exe dist/shardcoin-win64/ 2>/dev/null || true
          cp src/shardcoin-wallet.exe dist/shardcoin-win64/ 2>/dev/null || true
          for exe in dist/shardcoin-win64/*.exe; do
            ldd "$exe" 2>/dev/null | grep mingw64 | awk '{print $3}' | while read dll; do
              cp "$dll" dist/shardcoin-win64/ 2>/dev/null || true
            done
          done
          cd dist && 7z a -tzip shardcoin-win64.zip shardcoin-win64/

      - uses: actions/upload-artifact@v4
        with:
          name: shardcoin-win64
          path: dist/shardcoin-win64.zip

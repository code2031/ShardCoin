name: Build Windows
on:
  workflow_dispatch:

jobs:
  build:
    name: ShardCoin Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-libevent
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-zeromq
            mingw-w64-x86_64-db
            mingw-w64-x86_64-miniupnpc
            mingw-w64-x86_64-libsodium
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-fmt
            base-devel
            autoconf
            automake
            libtool
            pkg-config
            python3
            git

      - name: Build ShardCoin
        shell: msys2 {0}
        run: |
          # Debug: show what Boost libs exist
          ls /mingw64/lib/libboost_system* || echo "No boost_system libs found"
          ls /mingw64/lib/cmake/Boost*/BoostConfig.cmake || echo "No cmake config"

          ./autogen.sh

          # Patch configure to find MSYS2 Boost (it uses -mt suffixed libs)
          # The configure macro checks for -lboost_system but MSYS2 has -lboost_system-mt
          export BOOST_LIB_SUFFIX="-mt"

          ./configure \
            --without-gui \
            --without-miniupnpc \
            --disable-zmq \
            --disable-bench \
            --disable-fuzz-binary \
            --with-incompatible-bdb \
            --with-boost=/mingw64 \
            --with-boost-libdir=/mingw64/lib \
            CXXFLAGS="-O2" \
            LDFLAGS="-L/mingw64/lib" \
            CPPFLAGS="-I/mingw64/include" \
            LIBS="-lws2_32 -lssp -lbcrypt"
          make -j$(nproc)

      - name: Package
        shell: msys2 {0}
        run: |
          mkdir -p dist/shardcoin-win64
          for bin in shardcoind shardcoin-cli shardcoin-tx shardcoin-wallet; do
            if [ -f "src/${bin}.exe" ]; then
              cp "src/${bin}.exe" dist/shardcoin-win64/
              strip dist/shardcoin-win64/${bin}.exe
            fi
          done
          # Copy required DLLs
          for exe in dist/shardcoin-win64/*.exe; do
            ldd "$exe" 2>/dev/null | grep mingw64 | awk '{print $3}' | sort -u | while read dll; do
              cp "$dll" dist/shardcoin-win64/ 2>/dev/null || true
            done
          done
          ls -la dist/shardcoin-win64/
          cd dist && 7z a -tzip shardcoin-win64.zip shardcoin-win64/

      - uses: actions/upload-artifact@v4
        with:
          name: shardcoin-win64
          path: dist/shardcoin-win64.zip

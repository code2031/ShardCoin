name: Build Android APKs
on:
  workflow_dispatch:
  push:
    paths:
      - 'website_flutter/lib/**'
      - 'explorer_flutter/lib/**'
      - '.github/workflows/build-android.yml'

permissions:
  contents: write

jobs:
  build-website:
    name: ShardCoin Website APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
      - name: Add Android platform
        working-directory: website_flutter
        run: flutter create --platforms android .
      - name: Configure Android app
        working-directory: website_flutter
        run: |
          # Add internet permission and set app name
          sed -i '2i\    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
          sed -i 's/android:label="shardcoin_web"/android:label="ShardCoin"/' android/app/src/main/AndroidManifest.xml
      - name: Build APK
        working-directory: website_flutter
        run: flutter build apk --release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShardCoin-Website.apk
          path: website_flutter/build/app/outputs/flutter-apk/app-release.apk
      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp website_flutter/build/app/outputs/flutter-apk/app-release.apk ShardCoin.apk
          gh release upload v0.1.0 ShardCoin.apk --clobber

  build-explorer:
    name: ShardCoin Explorer APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
      - name: Add Android platform
        working-directory: explorer_flutter
        run: flutter create --platforms android .
      - name: Configure Android app
        working-directory: explorer_flutter
        run: |
          # Add internet permission and set app name
          sed -i '2i\    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
          sed -i 's/android:label="shardcoin_explorer"/android:label="ShardCoin Explorer"/' android/app/src/main/AndroidManifest.xml
      - name: Build APK
        working-directory: explorer_flutter
        run: flutter build apk --release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShardCoin-Explorer.apk
          path: explorer_flutter/build/app/outputs/flutter-apk/app-release.apk
      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp explorer_flutter/build/app/outputs/flutter-apk/app-release.apk ShardCoinExplorer.apk
          gh release upload v0.1.0 ShardCoinExplorer.apk --clobber
